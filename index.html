
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>⚓ Gestion des Ports</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

/* ===============================
   GLOBAL
=============================== */
body { 
  margin:0; 
  font-family:Segoe UI, Arial; 
  background:#f3f6fb;
  overflow:hidden;
}

/* ===============================
   HEADER MODERNE
=============================== */
#header {
  margin:15px;
  padding:15px 25px;
  border-radius:18px;
  background:linear-gradient(90deg,#1e3c72,#2a6fd6);
  color:white;
  font-size:20px;
  font-weight:600;
  box-shadow:0 6px 20px rgba(0,0,0,0.12);
}

/* ===============================
   TOPBAR
=============================== */
#topbar { 
  margin:0 15px 15px 15px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

/* SEARCH */
#topbar input {
  width:70%;
  padding:10px 15px;
  border-radius:30px;
  border:1px solid #ddd;
  background:white;
  outline:none;
  transition:0.2s;
}

#topbar input:focus {
  border-color:#007bff;
  box-shadow:0 0 5px rgba(0,123,255,0.4);
}

/* BUTTON + */
#topbar button {
  width:50px;
  height:50px;
  border-radius:50%;
  background:linear-gradient(135deg,#1e90ff,#007bff);
  color:white;
  font-size:24px;
  border:none;
  cursor:pointer;
  box-shadow:0 5px 18px rgba(0,0,0,0.25);
}

/* ===============================
   MAP
=============================== */
#map {
  margin:0 15px;
  height:75vh;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

/* ===============================
   PANELS (fiche + form)
=============================== */
#panel, #formPanel {
  position:fixed;
  top:0;
  bottom:0;
  right:0;
  width:400px;
  background:white;
  padding:20px;
  overflow-y:auto;
  z-index:2000;
  box-shadow:-10px 0 30px rgba(0,0,0,0.25);
  border-radius:20px 0 0 20px;
  display:none;
}

/* ===============================
   FORMULAIRE
=============================== */
.form-group {
  margin-bottom:14px;
  padding:12px;
  background:#f8fafc;
  border-radius:12px;
}

.form-group label {
  display:block;
  font-weight:600;
  margin-bottom:5px;
  color:#1f3c88;
}

/* INPUTS */
select, input, textarea {
  width:100%;
  padding:8px;
  border-radius:10px;
  border:1px solid #ddd;
  box-sizing:border-box;
}

/* ACTIONS */
.form-actions {
  position: sticky;
  bottom:0;
  background:white;
  padding-top:10px;
  border-top:1px solid #eee;
  display:flex;
  gap:10px;
}

.form-actions button {
  flex:1;
  border:none;
  border-radius:10px;
  padding:10px;
  font-weight:600;
  background:#007bff;
  color:white;
}

/* CLOSE BUTTON */
button[onclick*="fermer"]{
  background:#ccc !important;
  color:black;
}

/* ===============================
   TITRES + IMAGE
=============================== */
h2 {
  color:#1f3c88;
  margin-top:5px;
}

img {
  max-width:100%;
  border-radius:12px;
  margin-top:10px;
}

</style>
</head>

<body>

<div id="header">⚓ Ports</div>

<div id="topbar">
  <button onclick="ouvrirForm('')">➕</button>
  <input id="search" placeholder="Recherche..." oninput="rechercher()">
</div>

<div id="map"></div>
<div id="panel"></div>
<div id="formPanel"></div>
``



<script>

const API="https://script.google.com/macros/s/AKfycbzfnYG8o1UpXqDZSjj9Cg0ulCYUmr8-G2G09Uh5aoT1xhDbqc2smPFfDTxw6MqiYBho/exec";

var map=L.map('map').setView([48,-65],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let ports=[];

function safeStr(s){ return (s||"").replace(/'/g,"\\'"); }

// =========================
// LOAD
// =========================
async function charger(){

  try {

    let r = await fetch(API);

    let data = await r.json();

    if(!Array.isArray(data)){
      console.error("API invalide");
      return;
    }

    ports = data;

    afficher(ports);

  } catch(e){
    console.error("Erreur API:", e);
  }

}

// =========================
// SELECT OUI/NON
// =========================
function selectOuiNon(id, val){
  return "<select id='"+id+"'>"+
    "<option value=''>--Choisir--</option>"+
    "<option value='oui' "+(val==="oui"?"selected":"")+">Oui</option>"+
    "<option value='non' "+(val==="non"?"selected":"")+">Non</option>"+
  "</select>";
}

// =========================
// MAP DISPLAY
// =========================
function afficher(data){

  map.eachLayer(l=>{ 
    if(l instanceof L.Marker) map.removeLayer(l); 
  });

  data.forEach(p=>{

    let lat=parseFloat(p.Latitude);
    let lng=parseFloat(p.Longitude);

    if(isNaN(lat)||isNaN(lng)) return;

    let marker=L.marker([lat,lng]).addTo(map);

    let nom=p.Nom_du_port||"Port sans nom";

    marker.on("click", ()=>{
      L.popup()
      .setLatLng([lat,lng])
      .setContent(
        "<b>"+nom+"</b><br>"+
        (p.Ville||"")+"<br><br>"+

        "👨‍✈️ "+(p.Maitre_de_port||"")+"<br>"+
        "📞 "+(p.Telephone||"")+"<br>"+
        "✉️ "+(p.Courriel||"")+"<br><br>"+

        "<button onclick=\"ouvrirFiche('"+safeStr(nom)+"')\">Voir fiche</button>"
      )
      .openOn(map);
    });

  });
}

// =========================
// SEARCH
// =========================
function rechercher(){

  let t = document.getElementById("search").value.toLowerCase();

  if(t===""){
    afficher(ports);
    return;
  }

  let res = ports.filter(p =>
    (p.Nom_du_port||"").toLowerCase().includes(t) ||
    (p.Ville||"").toLowerCase().includes(t)
  );

  afficher(res);
}

// =========================
// PANELS CONTROL
// =========================
function fermerForm(){
  document.getElementById("formPanel").style.display="none";
}

function fermerFiche(){
  document.getElementById("panel").style.display="none";
}

// =========================
// FICHE DETAIL
// =========================
function ouvrirFiche(nom){

  let p = ports.find(x => x.Nom_du_port === nom);
  if(!p) return;

  document.getElementById("formPanel").style.display="none";

  function icone(v){
    if(v==="oui") return "<span style='color:green'>✅</span>";
    if(v==="non") return "<span style='color:red'>❌</span>";
    return "—";
  }

  document.getElementById("panel").innerHTML =

  "<button onclick='fermerFiche()'>❌</button><br><br>"+

  "<h2>"+p.Nom_du_port+"</h2>"+

  "<b>📍 Ville</b><br>"+(p.Ville||"")+
  "<br>"+(p.Province||"")+
  "<br>"+(p.Adresse||"")+"<br><br>"+

  "<b>👨‍✈️ Maître de port</b><br>"+(p.Maitre_de_port||"")+"<br><br>"+

  "<b>📞 Téléphone</b><br>"+(p.Telephone||"")+"<br><br>"+

  "<b>✉️ Courriel</b><br>"+(p.Courriel||"")+"<br><br>"+

  "<b>⚙️ Services</b><br>"+
  "Eau potable: "+icone(p.Eau_potable)+"<br>"+
  "Carburant: "+icone(p.Carburant)+"<br>"+
  "Vidange: "+icone(p.Vidange)+"<br>"+
  "Buanderie: "+icone(p.Buanderie)+"<br>"+
  "Voiture: "+icone(p.Voiture)+"<br><br>"+

  "<b>📊 Statut</b><br>"+(p.Statut || "Non défini")+"<br><br>"+

  "<b>📝 Informations</b><br>"+(p.Informations||"")+"<br><br>"+

  (p.Photos ? "<img src='"+p.Photos+"'>" : "<i>Aucune photo</i>") +

  "<br><br>"+

  "<div class='form-actions'>"+
  "<button onclick=\"ouvrirForm('"+safeStr(nom)+"')\">Modifier</button>"+
  "</div>";

  document.getElementById("panel").style.display="block";
}

// =========================
// FORMULAIRE COMPLET ORIGINAL
// =========================
function ouvrirForm(nom){

  document.getElementById("panel").style.display="none";

  let p = ports.find(x => x.Nom_du_port === nom) || {};

  document.getElementById("formPanel").innerHTML = `

  <h3>${nom?"Modifier":"Ajouter"}</h3>

  <input type='hidden' id='id' value='${p.ID||""}'>

  <div class='form-group'>
    <label>Nom</label>
    <input id='nom' value='${p.Nom_du_port||""}'>
  </div>

  <div class='form-group'>
    <label>Ville</label>
    <input id='ville' value='${p.Ville||""}'>
  </div>

  <div class='form-group'>
    <label>Latitude</label>
    <input id='lat' value='${p.Latitude||""}'>
  </div>

  <div class='form-group'>
    <label>Longitude</label>
    <input id='lng' value='${p.Longitude||""}'>
  </div>

  <div class='form-group'>
    <label>Région</label>
    <input id='region' value='${p.Region||""}'>
  </div>

  <div class='form-group'>
    <label>Province</label>
    <input id='province' value='${p.Province||""}'>
  </div>

  <div class='form-group'>
    <label>Maître de port</label>
    <input id='maitre' value='${p.Maitre_de_port||""}'>
  </div>

  <div class='form-group'>
    <label>Téléphone</label>
    <input id='tel' value='${p.Telephone||""}'>
  </div>

  <div class='form-group'>
    <label>Courriel</label>
    <input id='courriel' value='${p.Courriel||""}'>
  </div>

  <div class='form-group'>
    <label>Adresse</label>
    <input id='adresse' value='${p.Adresse||""}'>
  </div>

  <div class='form-group'><label>Eau potable</label>${selectOuiNon("eau",p.Eau_potable)}</div>
  <div class='form-group'><label>Carburant</label>${selectOuiNon("carburant",p.Carburant)}</div>
  <div class='form-group'><label>Vidange</label>${selectOuiNon("vidange",p.Vidange)}</div>
  <div class='form-group'><label>Buanderie</label>${selectOuiNon("buanderie",p.Buanderie)}</div>
  <div class='form-group'><label>Voiture</label>${selectOuiNon("voiture",p.Voiture)}</div>

  <div class='form-group'>
    <label>Informations</label>
    <textarea id='info'>${p.Informations||""}</textarea>
  </div>

  <div class='form-actions'>
    <button onclick='sauver()'>💾 Sauver</button>
    <button onclick='fermerForm()'>❌</button>
  </div>

  `;

  document.getElementById("formPanel").style.display="block";
}

// =========================
// SAVE
// =========================
function sauver(){

let data={
  "ID": document.getElementById("id").value || Date.now(),
  "Nom_du_port": document.getElementById("nom").value,
  "Ville": document.getElementById("ville").value,
  "Latitude": document.getElementById("lat").value,
  "Longitude": document.getElementById("lng").value,
  "Maitre_de_port": document.getElementById("maitre").value,
  "Courriel": document.getElementById("courriel").value,
  "Telephone": document.getElementById("tel").value,
  "Region": document.getElementById("region").value,
  "Province": document.getElementById("province").value,
  "Adresse": document.getElementById("adresse").value,
  "Eau_potable": document.getElementById("eau").value,
  "Carburant": document.getElementById("carburant").value,
  "Vidange": document.getElementById("vidange").value,
  "Buanderie": document.getElementById("buanderie").value,
  "Voiture": document.getElementById("voiture").value,
  "Informations": document.getElementById("info").value
};

  let fd=new FormData();
  for(let k in data) fd.append(k,data[k]);

  fetch(API,{method:"POST",body:fd})
  .then(async ()=>{
    fermerForm();
    await charger();
    ouvrirFiche(data["Nom_du_port"]);
  });

}

// =========================
// CLICK MAP
// =========================
map.on("click", e => {

  ouvrirForm("");

  setTimeout(()=>{

    let lat=document.getElementById("lat");
    let lng=document.getElementById("lng");

    if(lat && lng){
      lat.value=e.latlng.lat;
      lng.value=e.latlng.lng;
    }

  },200);

});

// =========================
// INIT
// =========================
charger();

// ✅ Fix resize map
window.addEventListener("load",()=>{
  setTimeout(()=>{
    map.invalidateSize();
  },300);
});

// ✅ Fermer panneaux
function fermerTout(){
  fermerForm();
  fermerFiche();
}

// ✅ Click extérieur


document.addEventListener("click", function(e){

  let panel = document.getElementById("panel");

  let clickDansPanel = panel.contains(e.target);
  let bouton = e.target.closest("button");

  // ✅ Si clic dans fiche ou bouton → ne rien faire
  if(clickDansPanel || bouton) return;

  // ✅ Sinon fermer UNIQUEMENT la fiche
  if(panel.style.display==="block"){
    panel.style.display="none";
  }

});




</script>
</body>
</html>
