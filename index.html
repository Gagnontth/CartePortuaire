
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>⚓ Gestion des Ports</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>

/* ===============================
   GLOBAL
=============================== */
body { 
  margin:0; 
  font-family:Segoe UI, Arial; 
  background:#f3f6fb;
  overflow:hidden;
}

/* ===============================
   HEADER MODERNE
=============================== */

#header {
  margin:15px;
  padding:12px 20px;
  border-radius:18px;
  background:linear-gradient(90deg,#1e3c72,#2a6fd6);
  color:white;
  font-size:16px;
  font-weight:600;
  box-shadow:0 6px 20px rgba(0,0,0,0.12);

  display:flex;
  justify-content:space-between;
  align-items:center;
}

#header-left {
  font-size:20px;
}

/* zone droite */
#header-right {
  display:flex;
  align-items:center;
  gap:10px;
}

/* champ recherche */
#header-right input {
  padding:8px 12px;
  border-radius:20px;
  border:none;
  outline:none;
  width:200px;
}

/* bouton + */

#header-right button {
  width:40px;
  height:40px;
  border-radius:50%;
  background:white;
  color:#007bff;
  border:none;
  font-size:20px;
  cursor:pointer;
}

#header-right button:hover {
  background:#e6f0ff;
}



/* ===============================
   MAP
=============================== */
#map {
  margin:0 15px;
  height:75vh;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

/* ===============================
   PANELS (fiche + form)
=============================== */
#panel, #formPanel {
  position:fixed;
  top:0;
  bottom:0;
  right:0;
  width:400px;
  background:white;
  padding:20px;
  overflow-y:auto;
  z-index:2000;
  box-shadow:-10px 0 30px rgba(0,0,0,0.25);
  border-radius:20px 0 0 20px;
  display:none;
}

#panel p, #panel div {
  line-height:1.5;
}

#panel, #formPanel {
  scroll-behavior:smooth;
}

/* ===============================
   FORMULAIRE
=============================== */
.form-group {
  margin-bottom:14px;
  padding:12px;
  background:#f8fafc;
  border-radius:12px;
}

.form-group label {
  display:block;
  font-weight:600;
  margin-bottom:5px;
  color:#1f3c88;
}

/* INPUTS */

.form-group select,
.form-group input,
.form-group textarea {
  width:100%;
  padding:8px;
  border-radius:10px;
  border:1px solid #ddd;
 border-color:#007bff;
  box-shadow:0 0 4px rgba(0,123,255,0.3);
  outline:none;
  box-sizing:border-box;
}


/* ACTIONS */
.form-actions {
  position: sticky;
  bottom:0;
  background:white;
  padding-top:10px;
  border-top:1px solid #eee;
  display:flex;
  gap:10px;
}

.form-actions button {
  flex:1;
  border:none;
  border-radius:10px;
  padding:10px;
  font-weight:600;
  background:#007bff;
  color:white;
}

.form-actions button:hover {
  background:#0056b3;
}


/* CLOSE BUTTON */
button[onclick*="fermer"]{
  background:#ccc !important;
  color:black;
}

#notif {
  position:fixed;
  bottom:30px;
  right:30px;
  background:#28a745;
  color:white;
  padding:12px 20px;
  border-radius:10px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
  opacity:0;
  transform:translateY(20px);
  transition:0.3s;
  z-index:3000;
}

#notif.show {
  opacity:1;
  transform:translateY(0);
}

/* ===============================
   TITRES + IMAGE
=============================== */
h2 {
  color:#1f3c88;
  margin-top:5px;
}

img {
  max-width:100%;
  border-radius:12px;
  margin-top:10px;
}

</style>
</head>

<body>


<div id="header">

  <div id="header-left">
    ⚓ Ports
  </div>

  <div id="header-right">
    <input id="search" placeholder="Recherche..." oninput="rechercher()">
    <button onclick="ouvrirForm('')">➕</button>
  </div>

</div>


<div id="map"></div>
<div id="panel"></div>
<div id="formPanel"></div>
``



<script>

const API="https://script.google.com/macros/s/AKfycbzfnYG8o1UpXqDZSjj9Cg0ulCYUmr8-G2G09Uh5aoT1xhDbqc2smPFfDTxw6MqiYBho/exec";

var map=L.map('map').setView([48,-65],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let ports=[];
let tempMarker;

function safeStr(s){ return (s||"").replace(/'/g,"\\'"); }

// =========================
// LOAD
// =========================
async function charger(){

  try {

    let r = await fetch(API);

    let data = await r.json();

    if(!Array.isArray(data)){
      console.error("API invalide");
      return;
    }

    ports = data;

    afficher(ports);

  } catch(e){
    console.error("Erreur API:", e);
  }

}

// =========================
// SELECT OUI/NON
// =========================
function selectOuiNon(id, val){
  return "<select id='"+id+"'>"+
    "<option value=''>--Choisir--</option>"+
    "<option value='oui' "+(val==="oui"?"selected":"")+">Oui</option>"+
    "<option value='non' "+(val==="non"?"selected":"")+">Non</option>"+
  "</select>";
}

// =========================
// MAP DISPLAY
// =========================
function afficher(data){

  map.eachLayer(l=>{ 
    if(l instanceof L.Marker) map.removeLayer(l); 
  });

  data.forEach(p=>{

    let lat=parseFloat(p.Latitude);
    let lng=parseFloat(p.Longitude);

    if(isNaN(lat)||isNaN(lng)) return;

    let marker=L.marker([lat,lng]).addTo(map);

    let nom=p.Nom_du_port||"Port sans nom";

    marker.on("click", ()=>{
      L.popup()
      .setLatLng([lat,lng])
      .setContent(
        "<b>"+nom+"</b><br>"+
        (p.Ville||"")+"<br><br>"+

        "👨‍✈️ "+(p.Maitre_de_port||"")+"<br>"+
        "📞 "+(p.Telephone||"")+"<br>"+
        "✉️ "+(p.Courriel||"")+"<br><br>"+

        "<button onclick=\"ouvrirFiche('"+safeStr(nom)+"')\">Voir fiche</button>"
      )
      .openOn(map);
    });

  });
}

// =========================
// SEARCH
// =========================
function rechercher(){

  let t = document.getElementById("search").value.toLowerCase();

  if(t===""){
    afficher(ports);
    return;
  }

  let res = ports.filter(p =>
    (p.Nom_du_port||"").toLowerCase().includes(t) ||
    (p.Ville||"").toLowerCase().includes(t)
  );

  afficher(res);
}

// =========================
// PANELS CONTROL
// =========================
function fermerForm(){
  document.getElementById("formPanel").style.display="none";
}

function fermerFiche(){
  document.getElementById("panel").style.display="none";
}

// =========================
// FICHE DETAIL
// =========================
function ouvrirFiche(nom){

  let p = ports.find(x => x.Nom_du_port === nom);
  if(!p) return;

  document.getElementById("formPanel").style.display="none";

  function icone(v){
    if(v==="oui") return "<span style='color:green'>✅</span>";
    if(v==="non") return "<span style='color:red'>❌</span>";
    return "—";
  }

  document.getElementById("panel").innerHTML =

  "<button onclick='fermerFiche()'>❌</button><br><br>"+

  "<h2>"+p.Nom_du_port+"</h2>"+

  "<b>📍 Ville</b><br>"+(p.Ville||"")+
  "<br>"+(p.Province||"")+
  "<br>"+(p.Adresse||"")+"<br><br>"+

  "<b>👨‍✈️ Maître de port</b><br>"+(p.Maitre_de_port||"")+"<br><br>"+

  "<b>📞 Téléphone</b><br>"+(p.Telephone||"")+"<br><br>"+

  "<b>✉️ Courriel</b><br>"+(p.Courriel||"")+"<br><br>"+


"<b>⚙️ Services</b><br>"+
"Eau potable: "+afficherService(p.Eau_potable)+"<br>"+
"Carburant: "+afficherService(p.Carburant)+"<br>"+
"Vidange: "+afficherService(p.Vidange)+"<br>"+
"Buanderie: "+afficherService(p.Buanderie)+"<br>"+
"Voiture: "+afficherService(p.Voiture)+"<br><br>"+


  "<b>📊 Statut</b><br>"+(p.Statut || "Non défini")+"<br><br>"+

  "<b>📝 Informations</b><br>"+(p.Informations || "").replace(/\n/g, "<br>")+"<br><br>"+

  (p.Photos ? "<img src='"+p.Photos+"'>" : "<i>Aucune photo</i>") +

  "<br><br>"+



"<div class='form-actions'>"+
"<button onclick=\"ouvrirForm('"+safeStr(nom)+"')\">Modifier</button>"+
"<button onclick=\"supprimerPort('"+p.ID+"')\" style='background:#dc3545'>Supprimer</button>"+
"</div>"

  document.getElementById("panel").style.display="block";
}


function afficherService(v){

  if(!v){
    return "❌";
  }

  // ✅ convertir en string pour éviter erreur
  let val = v.toString().trim();

  if(val === ""){
    return "❌";
  }

  return val;
}


// =========================
// FORMULAIRE COMPLET ORIGINAL
// =========================
function ouvrirForm(nom){

  document.getElementById("panel").style.display="none";

  let p = ports.find(x => x.Nom_du_port === nom) || {};

  document.getElementById("formPanel").innerHTML = `

  <h3>${nom?"Modifier":"Ajouter"}</h3>

  <input type='hidden' id='id' value='${p.ID||""}'>
<h3>📍 Informations générale
  <div class='form-group'>
    <label>Nom</label>
    <input id='nom' value='${p.Nom_du_port||""}'>
  </div>
  <div class='form-group'>
    <label>Latitude</label>
    <input id='lat' value='${p.Latitude||""}'>
  </div>

  <div class='form-group'>
    <label>Longitude</label>
    <input id='lng' value='${p.Longitude||""}'>
  </div>
  <div class='form-group'>
    <label>Ville</label>
    <input id='ville' value='${p.Ville||""}'>
  </div>
  
<div class='form-group'>
  <label>Région</label>
  <select id='region'>
    <option value=''>--Choisir--</option>
    <option value='Fleuve Saint-Laurent' ${(p.Region==="Fleuve Saint-Laurent")?"selected":""}>Fleuve Saint-Laurent</option>
    <option value='Voie Maritime' ${(p.Region==="Voie Maritime")?"selected":""}>Voie Maritime</option>
    <option value='Gaspesie' ${(p.Region==="Gaspesie")?"selected":""}>Gaspesie</option>
    <option value='Cote-Nord' ${(p.Region==="Cote-Nord")?"selected":""}>Côte-Nord</option>
    <option value='Golf du Saint-Laurent' ${(p.Region==="Golf du Saint-Laurent")?"selected":""}>Golfe du Saint-Laurent</option>
    <option value='Detroit de Northumberland' ${(p.Region==="Detroit de Northumberland")?"selected":""}>Détroit de Northumberland</option>
    <option value='Cape Breton' ${(p.Region==="Cape Breton")?"selected":""}>Cape Breton</option>
    <option value='Cote Est' ${(p.Region==="Cote Est")?"selected":""}>Côte Est</option>
    <option value='Terre-Neuve' ${(p.Region==="Terre-Neuve")?"selected":""}>Terre-Neuve</option>
  </select>
</div>

<div class='form-group'>
  <label>Province / Territoire</label>
  <select id='province'>

    <option value=''>--Choisir--</option>

    <option value='AB' ${(p.Province==="AB")?"selected":""}>Alberta</option>
    <option value='BC' ${(p.Province==="BC")?"selected":""}>Colombie-Britannique</option>
    <option value='MB' ${(p.Province==="MB")?"selected":""}>Manitoba</option>
    <option value='NB' ${(p.Province==="NB")?"selected":""}>Nouveau-Brunswick</option>
    <option value='NL' ${(p.Province==="NL")?"selected":""}>Terre-Neuve-et-Labrador</option>
    <option value='NS' ${(p.Province==="NS")?"selected":""}>Nouvelle-Écosse</option>
    <option value='NT' ${(p.Province==="NT")?"selected":""}>Territoires du Nord-Ouest</option>
    <option value='NU' ${(p.Province==="NU")?"selected":""}>Nunavut</option>
    <option value='ON' ${(p.Province==="ON")?"selected":""}>Ontario</option>
    <option value='PE' ${(p.Province==="PE")?"selected":""}>Île-du-Prince-Édouard</option>
    <option value='QC' ${(p.Province==="QC")?"selected":""}>Québec</option>
    <option value='SK' ${(p.Province==="SK")?"selected":""}>Saskatchewan</option>
    <option value='YT' ${(p.Province==="YT")?"selected":""}>Yukon</option>

  </select>
</div>

  <div class='form-group'>
    <label>Maître de port</label>
    <input id='maitre' value='${p.Maitre_de_port||""}'>
  </div>

  <div class='form-group'>
    <label>Téléphone</label>
    <input id='tel' value='${p.Telephone||""}'>
  </div>

  <div class='form-group'>
    <label>Courriel</label>
    <input id='courriel' value='${p.Courriel||""}'>
  </div>

  <div class='form-group'>
    <label>Adresse</label>
    <input id='adresse' value='${p.Adresse||""}'>
  </div>
<h3>⚙️ Services</h3>
<div class="form-group">
  <label for="eau">Eau potable</label>
  <input 
    type="text"
    id="eau"
    value="${p.Eau_potable || ""}" 
    placeholder="Ex: Oui / Non / Payant / Sur demande"
  >
</div>

<div class="form-group">
  <label for="carburant">Carburant</label>
  <input 
    type="text"
    id="carburant"
    value="${p.Carburant || ""}" 
    placeholder="Ex: Diesel / Essence / Non"
  >
</div>

<div class="form-group">
  <label for="vidange">Vidange</label>
  <input 
    type="text"
    id="vidange"
    value="${p.Vidange || ""}" 
    placeholder="Ex: Oui / Non / Payant"
  >
</div>

<div class="form-group">
  <label for="buanderie">Buanderie</label>
  <input 
    type="text"
    id="buanderie"
    value="${p.Buanderie || ""}" 
    placeholder="Ex: Oui / Non"
  >
</div>

<div class="form-group">
  <label for="voiture">Voiture</label>
  <input 
    type="text"
    id="voiture"
    value="${p.Voiture || ""}" 
    placeholder="Ex: Taxi / Location / Navette"
  >
</div>
</div>
 
<div class="form-group">

  <label for="info">Informations</label>

  <textarea 
    id="info"
    rows="6"
    placeholder="Écrire les informations détaillées ici..."
  >${p.Informations || ""}</textarea>

</div>

    <button onclick='sauver()'>💾 Sauver</button>
    <button onclick='fermerForm()'>❌</button>
  </div>
  `;

// =========================
// SAVE
// =========================
function sauver(){

let data={
  "ID": document.getElementById("id").value || Date.now(),
  "Nom_du_port": document.getElementById("nom").value,
  "Ville": document.getElementById("ville").value,
  "Latitude": document.getElementById("lat").value,
  "Longitude": document.getElementById("lng").value,
  "Maitre_de_port": document.getElementById("maitre").value,
  "Courriel": document.getElementById("courriel").value,
  "Telephone": document.getElementById("tel").value,
  "Region": document.getElementById("region").value,
  "Province": document.getElementById("province").value,
  "Adresse": document.getElementById("adresse").value,
  "Eau_potable": document.getElementById("eau").value,
  "Carburant": document.getElementById("carburant").value,
  "Vidange": document.getElementById("vidange").value,
  "Buanderie": document.getElementById("buanderie").value,
  "Voiture": document.getElementById("voiture").value,
  "Informations": document.getElementById("info").value
};

  let fd=new FormData();
  for(let k in data) fd.append(k,data[k]);


fetch(API,{method:"POST",body:fd})
.then(async ()=>{

  showNotif("✅ Port sauvegardé");

  fermerForm();

  await charger();
  ouvrirFiche(data["Nom_du_port"]);

});


}

function showNotif(message){

  let n = document.getElementById("notif");

  n.innerText = message;
  n.classList.add("show");

  setTimeout(()=>{
    n.classList.remove("show");
  }, 2000);

}

// =========================
// CLICK MAP
// =========================

map.on("click", e => {

  let form = document.getElementById("formPanel");

  // ✅ enlever ancien marker
  if(tempMarker){
    map.removeLayer(tempMarker);
  }

  // ✅ ajouter nouveau marker temporaire
  tempMarker = L.marker(e.latlng).addTo(map);

  let lat = e.latlng.lat.toFixed(6);
  let lng = e.latlng.lng.toFixed(6);

  // ✅ si formulaire ouvert → modifier seulement
  if(form.style.display === "block"){

    let latInput = document.getElementById("lat");
    let lngInput = document.getElementById("lng");

    if(latInput && lngInput){
      latInput.value = lat;
      lngInput.value = lng;
    }

    return;
  }

  // ✅ sinon ouvrir nouveau
  ouvrirForm("");

  setTimeout(() => {

    document.getElementById("lat").value = lat;
    document.getElementById("lng").value = lng;

  }, 200);

});

// =========================
// INIT
// =========================
charger();

// ✅ Fix resize map
window.addEventListener("load",()=>{
  setTimeout(()=>{
    map.invalidateSize();
  },300);
});

// ✅ Fermer panneaux
function fermerTout(){
  fermerForm();
  fermerFiche();
}

// ✅ Click extérieur

document.addEventListener("click", function(e){

  let panel = document.getElementById("panel");
  let form = document.getElementById("formPanel");
  let mapDiv = document.getElementById("map");

  // ✅ clic dans fiche
  if(panel.contains(e.target)) return;

  // ✅ clic dans formulaire → jamais fermer
  if(form.contains(e.target)) return;

  // ✅ clic sur carte → jamais fermer
  if(mapDiv.contains(e.target)) return;

  // ✅ clic sur bouton → éviter conflits
  if(e.target.closest("button")) return;

  // ✅ fermer seulement fiche
  if(panel.style.display==="block"){
    panel.style.display="none";
  }

});


function supprimerPort(id){

  let password = prompt("Mot de passe requis pour supprimer ce port");

  if(password !== "cul"){
    alert("❌ Mot de passe incorrect");
    return;
  }

  if(!confirm("⚠️ Confirmer la suppression définitive ?")) return;

  let fd = new FormData();
  fd.append("action","delete");
  fd.append("ID", id);


  fetch(API,{
    method:"POST",
    body:fd
  })
  .then(res => res.json())
  .then(async (data)=>{

    console.log("Réponse serveur:", data);

    if(data.status === "deleted"){
      showNotif("🗑️ Port supprimé : " + id);
      fermerFiche();
      await charger();
    } else {
      alert("❌ Suppression échouée");
    }

  });

}


</script>
   <div id="notif"></div>
</body>
</html>
